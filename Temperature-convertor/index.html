<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Temperature Converter</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="background-blur blur1"></div>
<div class="background-blur blur2"></div>

<div class="card">

    <h1>🌡️ Temperature Converter</h1>
    <p class="subtitle">Fast, Accurate & Professional Temperature Conversion</p>

    <div class="input-group">
        <label>Temperature</label>
        <input type="number" id="temperature" placeholder="Enter value">
    </div>

    <div class="input-group">
        <label>Convert From</label>

        <select id="unit">
            <option value="celsius">🌡 Celsius</option>
            <option value="fahrenheit">🔥 Fahrenheit</option>
            <option value="kelvin">❄ Kelvin</option>
        </select>
    </div>

    <button onclick="convertTemperature()">
        Convert Temperature
    </button>

    <div class="results">

        <div class="result-card">
            <h3>🌡 Celsius</h3>
            <h2 id="celsiusResult">--</h2>
        </div>

        <div class="result-card">
            <h3>🔥 Fahrenheit</h3>
            <h2 id="fahrenheitResult">--</h2>
        </div>

        <div class="result-card">
            <h3>❄ Kelvin</h3>
            <h2 id="kelvinResult">--</h2>
        </div>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
